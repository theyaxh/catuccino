<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case study page — onepx</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { width: 100%; height: 100%; }

    body {
      background: #fff;
      font-family: 'Geist', system-ui, sans-serif;
      font-weight: 400;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
    }

    h1 {
      font-size: 32px;
      font-weight: 400;
      letter-spacing: -0.04em;
      color: #000;
    }

    .nav-link {
      font-size: 20px;
      font-weight: 400;
      letter-spacing: -0.04em;
      color: #000;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
      cursor: pointer;
    }

    .nav-link:hover { opacity: 0.6; }
  </style>
</head>
<body>
  <div class="page">
    <h1>Case study page</h1>
    <a href="index.html" class="nav-link" data-transition>Click to landing page</a>
  </div>
  <script src="pixel-transition.js"></script>
</body>
</html>
